                    <div class="product-detail__tags">
                      <p class="product-detail__tag-line" data-product-slot="tag-line"></p>
                    </div>
                  </section>
                </div>

                <section class="product-detail__content-full" data-product-slot="content-full"></section>
                <section class="product-contact-card" data-product-slot="contact-card"></section>
              </section>
            </section>

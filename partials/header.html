<header class="site-header">
  <div class="header-top">
    <div class="container">
      <div class="col-inner">
        <div class="header-layout">
          <div class="header-left">
            <a class="logo-link" href="/index.html" aria-label="Trang chủ">
              <img id="site-logo" class="logo-img" alt="Logo" data-asset="logo">
            </a>
          </div>

          <div class="header-center">
            <div class="header-text" id="top-text">
              <div class="header-line1" data-site="brand.companyLine1"></div>
              <div class="header-line2" data-site="brand.companyLine2"></div>
            </div>
          </div>

          <div class="header-right">
            <div class="header-text follow-us">Theo dõi chúng tôi trên:</div>
            <div class="header-social" id="header-social"></div>
          </div>

          <button class="nav-toggle-mobile" id="btn-menu-mobile" aria-label="Mở menu">☰</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="header-menu">
    <div class="container">
      <div class="col-inner">
        <ul class="nav__list" id="mainMenu"></ul>
      </div>
    </div>
  </nav>

  <div class="mobile-drawer" id="mobile-drawer" hidden>
    <ul class="mobile-nav" id="mobile-nav"></ul>
    <button class="btn-close-drawer" id="btn-close-drawer" aria-label="Đóng">Đóng</button>
  </div>
</header>

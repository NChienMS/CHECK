<section class="header-slider" aria-label="Slider giới thiệu">
  <div class="container">
    <div class="col-inner">
      <div class="header-slider__viewport" id="header-slider">
        <div class="header-slider__track">
          <div class="header-slider__slide is-active">
            <img src="/assets/img/general/slide1.jpg" alt="Slide 1">
          </div>
          <div class="header-slider__slide">
            <img src="/assets/img/general/slide2.jpg" alt="Slide 2">
          </div>
          <div class="header-slider__slide">
            <img src="/assets/img/general/slide3.jpg" alt="Slide 3">
          </div>
        </div>

        <div class="header-slider__dots" aria-label="Chọn slide">
          <button class="header-slider__dot is-active" type="button" aria-label="Xem slide 1"></button>
          <button class="header-slider__dot" type="button" aria-label="Xem slide 2"></button>
          <button class="header-slider__dot" type="button" aria-label="Xem slide 3"></button>
        </div>

        <button class="header-slider__arrow header-slider__arrow--prev" type="button" aria-label="Slide trước">
          <span></span>
        </button>
        <button class="header-slider__arrow header-slider__arrow--next" type="button" aria-label="Slide tiếp theo">
          <span></span>
        </button>
      </div>
    </div>
  </div>
</section>
